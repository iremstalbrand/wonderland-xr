<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wonderland Test</title>
    <!-- A-Frame'i CDN'den çağırıyoruz, indirmeye gerek yok -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <!-- 3D sahne buradan başlıyor -->
    <a-scene>
      <!-- modeli burada tanımlıyoruz -->
      <a-assets>
        <a-asset-item id="myModel" src="clock.glb"></a-asset-item>
      </a-assets>

      <!-- zemin (greybox: sade gri düzlem) -->
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="10"
        height="10"
        color="#444"
      ></a-plane>

      <!-- birkaç gri kutu (ileride objelerin yerine geçecek) -->
      <a-box position="-1.5 0.5 -3" color="#888"></a-box>
      <a-box position="0 0.5 -4" color="#999"></a-box>
      <a-box position="1.5 0.5 -3" color="#888"></a-box>

      <!-- saat modeli (tıklanabilir) -->
      <a-entity
        id="clock"
        class="clickable"
        gltf-model="#myModel"
        position="0 1.2 -5"
        scale="0.01 0.01 0.01"
        rotation="0 90 0"
      ></a-entity>

      <!-- kamera + cursor + kaygı yazısı -->
      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor
          raycaster="objects: .clickable"
          material="color: white; shader: flat"
          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
        >
        </a-cursor>

        <!-- kaygı cümlesinin görüneceği yer (başta boş) -->
        <a-text
          id="anxietyText"
          value=""
          align="center"
          color="#e0d0a0"
          width="2"
          position="0 -0.4 -1.5"
        ></a-text>
      </a-entity>

      <!-- ışık -->
      <a-light type="ambient" color="#bbb"></a-light>
      <a-light type="point" intensity="0.6" position="2 4 4"></a-light>

      <!-- gökyüzü / arka plan rengi -->
      <a-sky color="#222"></a-sky>
    </a-scene>

    <!-- etkileşim kodu -->
    <script>
      document.querySelector("#clock").addEventListener("click", function () {
        var text = document.querySelector("#anxietyText");
        text.setAttribute("value", "I'm running out of time.");
        // 4 saniye sonra yazı kaybolsun
        setTimeout(function () {
          text.setAttribute("value", "");
        }, 4000);
      });
    </script>
  </body>
</html>

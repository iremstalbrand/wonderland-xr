<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wonderland XR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #1a0a2e; density: 0.04"
             cursor="rayOrigin: mouse"
             raycaster="objects: .clickable">

      <a-assets>
        <a-asset-item id="rabbit-model" src="assets/rabbit/scene.gltf"></a-asset-item>
        <a-asset-item id="delight-model" src="assets/delight/scene.gltf"></a-asset-item>
        <a-asset-item id="madhatter-model" src="assets/madhatter/scene.gltf"></a-asset-item>
      </a-assets>

      <a-entity
        id="rabbit"
        gltf-model="#rabbit-model"
        position="0 0 -3"
        scale="0.01 0.01 0.01"
        class="clickable">
      </a-entity>
      <a-entity
          gltf-model="#delight-model"
          position="-2 0 -3"
          scale="0.5 0.5 0.5"
          class="clickable">
        </a-entity>
       <a-entity
        gltf-model="#madhatter-model"
        position="2 1 -3"
        scale="2 2 2"
        rotation="0 -90 0 "
        class="clickable">
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="14" height="14" color="#1a0f0a"></a-plane>
      <a-plane position="0 4 0" rotation="90 0 0" width="14" height="14" color="#0d0820"></a-plane>
      <a-plane position="0 2 -7" rotation="0 0 0" width="14" height="4" color="#12082a"></a-plane>
      <a-plane position="0 2 7" rotation="0 180 0" width="14" height="4" color="#12082a"></a-plane>
      <a-plane position="-7 2 0" rotation="0 90 0" width="14" height="4" color="#0f0a1f"></a-plane>
      <a-plane position="7 2 0" rotation="0 -90 0" width="14" height="4" color="#0f0a1f"></a-plane>

      <a-light type="ambient" color="#ffffff" intensity="2"></a-light>
      <a-light type="point" color="#6b2fa0" intensity="2" position="0 3 -3"></a-light>
      <a-light type="point" color="#1a4a2e" intensity="3" position="-4 2 -3"></a-light>

      <a-camera position="0 1.6 0"></a-camera>

    </a-scene>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wonderland XR -- Forest</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script>
      AFRAME.registerComponent("goto-room", {
        init: function () {
          this.el.addEventListener("click", function () {
            const overlay = document.getElementById("fade-overlay");
            overlay.style.opacity = "1";
            setTimeout(() => {
              window.location.href = "rabbithole.html";
            }, 1500);
          });
        },
      });
    </script>
    <style>
      #fade-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        opacity: 0;
        transition: opacity 1.5s ease;
        pointer-events: none;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="fade-overlay"></div>

    <a-scene fog="type: exponential; color: #0a1a05; density: 0.08">
      <a-assets>
        <a-asset-item id="flower-field" src="/assets/forest/flower_field_small.glb"></a-asset-item>
        <a-asset-item id="mushroom" src="/assets/forest/mushroom.glb"></a-asset-item>
        <a-asset-item id="flower" src="/assets/forest/flower_small.glb"></a-asset-item>
        <a-asset-item id="tree-small" src="/assets/forest/tree_small.glb"></a-asset-item>
      </a-assets>

      <a-text
        id="introText"
        value="Look for the way down."
        position="0 1.8 -2"
        align="center"
        color="#e8dcc4"
        width="3"
        anchor="center"
        opacity="1"
        animation="property: opacity; from: 1; to: 0; dur: 3000; delay: 4000; easing: easeInOutQuad"
      ></a-text>

      <a-sky color="#0d1a0d"></a-sky>

      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#1a3a10"></a-plane>
      <a-plane position="0 0.01 0" rotation="-90 0 0" width="26" height="26" color="#1f4512"></a-plane>

      <!-- Tree -->
      <a-entity gltf-model="#tree-small" position="0 3 -6" scale="7 7 7" rotation="0 -90 0"></a-entity>

      <!-- Portal trigger, separate from tree entity -->
      <a-sphere
        position="0 3 -6"
        radius="3"
        material="opacity: 0.01; transparent: true"
        class="clickable"
        goto-room
      ></a-sphere>

      <!-- Mushrooms -->
      <a-entity gltf-model="#mushroom" position="-2 1 -3.6" scale="2.5 2.5 2.5" rotation="0 20 0"></a-entity>
      <a-entity gltf-model="#mushroom" position="-4 1 -3" scale="1.8 1.8 1.8" rotation="0 90 0"></a-entity>
      <a-entity gltf-model="#mushroom" position="4 1 -3" scale="1.8 1.8 1.8" rotation="0 -60 0"></a-entity>
      <a-entity gltf-model="#mushroom" position="3.2 1 -5" scale="1.6 1.6 1.6" rotation="0 45 0"></a-entity>
      <a-entity gltf-model="#mushroom" position="4 1 -4.5" scale="1.2 1.2 1.2" rotation="0 60 0"></a-entity>
      <a-entity gltf-model="#mushroom" position="-1.8 1 -1.8" scale="0.4 0.4 0.4" rotation="0 -45 0"></a-entity>

      <!-- Flower -->
      <a-entity gltf-model="#flower" position="-1.5 0.3 -3" rotation="0 -45 0" scale="1 1 1"></a-entity>

      <!-- Flower Field -->
      <a-entity gltf-model="#flower-field" position="2 0.15 -3" scale="2 2 2" rotation="0 110 0"></a-entity>

      <!-- Background trees -->
      <a-entity position="-5 0 -8"><a-cylinder color="#2a1505" radius="0.3" height="6" position="0 3 0" segments-radial="6"></a-cylinder><a-sphere color="#1a3a0a" radius="2" position="0 6 0" scale="1 1.2 1"></a-sphere><a-sphere color="#1f4510" radius="1.5" position="0.7 5 0.3"></a-sphere><a-sphere color="#163008" radius="1.3" position="-0.5 5.5 -0.2"></a-sphere></a-entity>
      <a-entity position="-2 0 -8.5"><a-cylinder color="#251004" radius="0.25" height="5.5" position="0 2.75 0" segments-radial="6"></a-cylinder><a-sphere color="#1a3a0a" radius="1.8" position="0 5.5 0" scale="1 1.1 1"></a-sphere><a-sphere color="#1f4510" radius="1.3" position="0.5 4.8 0.2"></a-sphere></a-entity>
      <a-entity position="1 0 -9"><a-cylinder color="#2a1505" radius="0.28" height="6.5" position="0 3.25 0" segments-radial="6"></a-cylinder><a-sphere color="#163008" radius="2" position="0 6.5 0" scale="1 1.2 1"></a-sphere><a-sphere color="#1a3a0a" radius="1.5" position="-0.5 5.8 0.3"></a-sphere></a-entity>
      <a-entity position="4 0 -8.5"><a-cylinder color="#251004" radius="0.25" height="5" position="0 2.5 0" segments-radial="6"></a-cylinder><a-sphere color="#1a3a0a" radius="1.7" position="0 5 0" scale="1 1.1 1"></a-sphere><a-sphere color="#163008" radius="1.2" position="0.4 4.3 0.2"></a-sphere></a-entity>
      <a-entity position="6.5 0 -7"><a-cylinder color="#2a1505" radius="0.3" height="6" position="0 3 0" segments-radial="6"></a-cylinder><a-sphere color="#1f4510" radius="1.9" position="0 6 0" scale="1 1.2 1"></a-sphere><a-sphere color="#1a3a0a" radius="1.4" position="-0.5 5.2 0.3"></a-sphere></a-entity>
      <a-entity position="-8 0 -5"><a-cylinder color="#2a1505" radius="0.3" height="6" position="0 3 0" segments-radial="6"></a-cylinder><a-sphere color="#1a3a0a" radius="2" position="0 6 0" scale="1 1.2 1"></a-sphere><a-sphere color="#163008" radius="1.5" position="0.6 5 0.3"></a-sphere></a-entity>
      <a-entity position="-8.5 0 -2"><a-cylinder color="#251004" radius="0.28" height="5.5" position="0 2.75 0" segments-radial="6"></a-cylinder><a-sphere color="#1f4510" radius="1.8" position="0 5.5 0" scale="1 1.1 1"></a-sphere><a-sphere color="#1a3a0a" radius="1.3" position="0.5 4.8 0.2"></a-sphere></a-entity>
      <a-entity position="-8 0 1"><a-cylinder color="#2a1505" radius="0.25" height="5" position="0 2.5 0" segments-radial="6"></a-cylinder><a-sphere color="#163008" radius="1.7" position="0 5 0" scale="1 1.1 1"></a-sphere><a-sphere color="#1a3a0a" radius="1.2" position="0.4 4.3 0.2"></a-sphere></a-entity>
      <a-entity position="8 0 -5"><a-cylinder color="#2a1505" radius="0.3" height="6" position="0 3 0" segments-radial="6"></a-cylinder><a-sphere color="#1f4510" radius="2" position="0 6 0" scale="1 1.2 1"></a-sphere><a-sphere color="#163008" radius="1.5" position="-0.6 5 0.3"></a-sphere></a-entity>
      <a-entity position="8.5 0 -2"><a-cylinder color="#251004" radius="0.28" height="5.5" position="0 2.75 0" segments-radial="6"></a-cylinder><a-sphere color="#1a3a0a" radius="1.8" position="0 5.5 0" scale="1 1.1 1"></a-sphere><a-sphere color="#1f4510" radius="1.3" position="-0.5 4.8 0.2"></a-sphere></a-entity>
      <a-entity position="8 0 1"><a-cylinder color="#2a1505" radius="0.25" height="5" position="0 2.5 0" segments-radial="6"></a-cylinder><a-sphere color="#163008" radius="1.7" position="0 5 0" scale="1 1.1 1"></a-sphere><a-sphere color="#1a3a0a" radius="1.2" position="-0.4 4.3 0.2"></a-sphere></a-entity>
      <a-entity position="-6 0 3"><a-cylinder color="#2a1505" radius="0.28" height="5.5" position="0 2.75 0" segments-radial="6"></a-cylinder><a-sphere color="#1a3a0a" radius="1.8" position="0 5.5 0" scale="1 1.2 1"></a-sphere><a-sphere color="#1f4510" radius="1.3" position="0.5 4.8 0.2"></a-sphere></a-entity>
      <a-entity position="-3 0 4"><a-cylinder color="#251004" radius="0.25" height="5" position="0 2.5 0" segments-radial="6"></a-cylinder><a-sphere color="#163008" radius="1.6" position="0 5 0" scale="1 1.1 1"></a-sphere><a-sphere color="#1a3a0a" radius="1.2" position="0.4 4.3 0.2"></a-sphere></a-entity>
      <a-entity position="3 0 4"><a-cylinder color="#2a1505" radius="0.25" height="5" position="0 2.5 0" segments-radial="6"></a-cylinder><a-sphere color="#1f4510" radius="1.6" position="0 5 0" scale="1 1.1 1"></a-sphere><a-sphere color="#163008" radius="1.2" position="-0.4 4.3 0.2"></a-sphere></a-entity>
      <a-entity position="6 0 3"><a-cylinder color="#251004" radius="0.28" height="5.5" position="0 2.75 0" segments-radial="6"></a-cylinder><a-sphere color="#1a3a0a" radius="1.8" position="0 5.5 0" scale="1 1.2 1"></a-sphere><a-sphere color="#1f4510" radius="1.3" position="-0.5 4.8 0.2"></a-sphere></a-entity>

      <a-light type="ambient" color="#2a4a1a" intensity="1.8"></a-light>
      <a-light type="point" color="#ff6600" intensity="1.5" position="6 6 2" distance="20"></a-light>
      <a-light type="point" color="#ffaa44" intensity="1" position="-5 5 0" distance="15"></a-light>
      <a-light type="point" color="#2244aa" intensity="0.8" position="0 4 -8" distance="12"></a-light>
      <a-light type="point" color="#aaffaa" intensity="0.5" position="0 6 0" distance="20"></a-light>

      <a-camera position="0 1.4 0">
        <a-cursor
          color="#ffffff"
          fuse="false"
          raycaster="objects: .clickable; far: 100"
        ></a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>

    <script>
      AFRAME.registerComponent("goto-room", {
        init: function () {
          this.el.addEventListener("mousedown", function () {
            window.location.href = "rabbithole.html";
          });
        },
      });

      AFRAME.registerComponent("rotate-y", {
        tick: function () {
          this.el.object3D.rotation.y += 0.005;
        },
      });
    </script>

      #fade-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        opacity: 0;
        transition: opacity 1.5s ease;
        pointer-events: none;
        z-index: 9999;
      }
    </style>
  </head>

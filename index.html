<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wonderland Test</title>
    <!-- A-Frame'i CDN call, no need to download -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <!-- 3D scene begins here -->
    <a-scene>
      <!-- model -->
      <a-assets>
        <a-asset-item id="myModel" src="clock.glb"></a-asset-item>
      </a-assets>

      <!-- ground (greybox) -->
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="10"
        height="10"
        color="#444"
      ></a-plane>

      <!-- gray boxes (will switch with 3D assets later) -->
      <a-box position="-1.5 0.5 -3" color="#888"></a-box>
      <a-box position="0 0.5 -4" color="#999"></a-box>
      <a-box position="1.5 0.5 -3" color="#888"></a-box>

      <!-- clock model (clickable) -->
      <a-entity
        id="clock"
        class="clickable"
        gltf-model="#myModel"
        position="0 1.2 -5"
        scale="0.01 0.01 0.01"
        rotation="0 90 0"
      ></a-entity>

      <!-- camera + cursor + text -->
      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor
          raycaster="objects: .clickable"
          material="color: white; shader: flat"
          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
        >
        </a-cursor>

        <!-- anxiety text (empty in the beginnig) -->
        <a-text
          id="anxietyText"
          value=""
          align="center"
          color="#e0d0a0"
          width="2"
          position="0 -0.4 -1.5"
        ></a-text>
      </a-entity>

      <!-- light -->
      <a-light type="ambient" color="#bbb"></a-light>
      <a-light type="point" intensity="0.6" position="2 4 4"></a-light>

      <!-- backround color -->
      <a-sky color="#222"></a-sky>
    </a-scene>

    <!-- interaction -->
    <script>
      document.querySelector("#clock").addEventListener("click", function () {
        var text = document.querySelector("#anxietyText");
        text.setAttribute("value", "I'm running out of time.");

        setTimeout(function () {
          text.setAttribute("value", "");
        }, 4000);
      });
    </script>
  </body>
</html>

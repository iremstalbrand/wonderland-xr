<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wonderland XR -- Rabbit Hole</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script>
      AFRAME.registerComponent("tunnel-camera", {
        init: function () {
          this.t = 0;
          
          setTimeout(function () {
            document.getElementById("fade-overlay").style.opacity = "1";
          }, 4000);
          setTimeout(function () {
            window.location.href = "room.html";
          }, 5000);
        },
       tick: function (time, delta) {
        this.t += delta * 0.0002;
        if (this.t > 1) this.t = 1;
        
        var y = 15 - this.t * 30;
        this.el.setAttribute("position", { x: 0, y: y, z: 8 }); // 
        }
      });
    </script>
    <style>
      #fade-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: black;
        opacity: 0;
        transition: opacity 1s ease;
        pointer-events: none;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="fade-overlay"></div>

    <a-scene>
      <a-assets>
        <a-asset-item id="rabbithole-src" src="assets/rabbithole/down_the_rabbit_hole_-_alice_in_wonderland.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#000000"></a-sky>

      <a-entity
        id="rabbithole-model"
        gltf-model="#rabbithole-src"
        position="0 0 0"
        rotation="0 270 0"
        scale="1 1 1"
        animation-mixer="clip: *; loop: repeat">
      </a-entity>

     <a-camera tunnel-camera look-controls="enabled: false" wasd-controls="enabled: false" position="0 15 8"></a-camera>
    </a-scene>

    <script>
      setTimeout(function () {
        document.getElementById("fade-overlay").style.opacity = "1";
      }, 4000);
      setTimeout(function () {
        window.location.href = "room.html";
      }, 5000);
    </script>
  </body>
</html>

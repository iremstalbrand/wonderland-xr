<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wonderland XR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene
      fog="type: exponential; color: #1a0a2e; density: 0.04"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable"
    >
      <!-- ASSETS -->
      <a-assets>
        <a-asset-item id="mirror-model" src="assets/mirror.glb"></a-asset-item>
        <a-asset-item
          id="table-model"
          src="assets/tea_table.glb"
        ></a-asset-item>
        <a-asset-item id="cards-model" src="assets/cards.glb"> </a-asset-item>
        <a-asset-item id="cake-model" src="assets/cake.glb"> </a-asset-item>
        <a-asset-item
          id="candles-model"
          src="assets/candles.glb"
        ></a-asset-item>
        <a-asset-item id="potion-model" src="assets/potion.glb"> </a-asset-item>
        <a-asset-item id="books-model" src="assets/books.glb"> </a-asset-item>
        <a-asset-item
          id="bookshelf-model"
          src="assets/bookshelf.glb"
        ></a-asset-item>
        <a-asset-item id="chandelier-model" src="assets/chandelier.glb">
        </a-asset-item>
        <a-asset-item id="clock-model" src="assets/clock.glb"></a-asset-item>
        <a-asset-item id="coach-model" src="assets/coach.glb"></a-asset-item>
        <a-asset-item
          id="fireplace-model"
          src="assets/fireplace.glb"
        ></a-asset-item>
        <a-asset-item id="alice-model" src="assets/alice.glb"> </a-asset-item>
        <a-asset-item id="mad-hatter-model" src="assets/mad_hatter.glb">
        </a-asset-item>
        <a-asset-item id="cat-model" src="assets/cat.glb"> </a-asset-item>
      </a-assets>
        <a-asset-item id="window-model" src="assets/window.glb"> </a-asset-item>
      </a-assets>
          <a-asset-item id="curtains-model" src="assets/curtains.glb"> </a-asset-item>
      </a-assets>
           <a-asset-item id="side-table-model" src="assets/side_table.glb"> </a-asset-item>
      </a-assets>
             <a-asset-item id="rug-model" src="assets/rug.glb"> </a-asset-item>
      </a-assets>

      <!-- ENTITIES-->
        <a-entity
        id="mirror"
        gltf-model="#mirror-model"
        rotation="0 270 0"
        position="0 1.3 -2.8"
        scale="1.8 2.5 1.8"
        class="clickable"
      >
      </a-entity>

      <!--mirror interaction text-->
      <a-text 
      id="mirrorText"
      value=""
      position="0 2 -1"
      align="center"
      color="#d8c8ff"
      width="2"
      anchor="center"
      visible="false"
      ></a-text>

      <a-entity
        gltf-model="#table-model"
        rotation="0 180 0"
        position="0 0.6 1"
        scale="2 2 2"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#cards-model"
        rotation="0 270 0"
        position="0 1.4 1"
        scale="0.3 0.3 0.3"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#cake-model"
        rotation="0 270 0"
        position="1 1 1"
        scale="0.3 0.3 0.3"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#candles-model"
        rotation="0 270 0"
        position="1 0.8 2"
        scale="1 1 1"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#potion-model"
        rotation="0 270 0"
        position="1.5 2 -2.8"
        scale="0.5 1 1.2"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#books-model"
        rotation="0 270 0"
        position="1.5 0.4 -2.6"
        scale="1 1 1"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#bookshelf-model"
        rotation="0 270 0"
        position="-1.5 1.3 -2.8"
        scale="1.8 2.5 1.8"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#chandelier-model"
        rotation="0 180 0"
        position="0 3 0"
        scale="1 1 1"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#coach-model"
        rotation="0 180 0"
        position="2.5 0.6 1"
        scale="1 1 1"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#clock-model"
        rotation="0 270 0"
        position="-1.5 1.3 2"
        scale="1.8 2.5 1.8"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#fireplace-model"
        rotation="0 270 0"
        position="-1.5 1.3 2"
        scale="1.8 2.5 1.8"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#alice-model"
        rotation="0 270 0"
        position="1.5 1.3 2"
        scale="1.8 2 1.8"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#mad-hatter-model"
        rotation="0 180 0"
        position="2.5 0.6 1"
        scale="1 1 1"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#cat-model"
        rotation="0 180 0"
        position="2.5 0.6 1"
        scale="0.5 0.5 0.5"
        class="clickable"
      >
      </a-entity>

       <a-entity
        gltf-model="#window-model"
        rotation="0 360 0"
        position="-2.9 1.8 0"
        scale="1 1.5 1.4"
        class="clickable"
      >
      </a-entity>

       <a-entity
        gltf-model="#curtains-model"
        rotation="0 360 0"
        position="-2.9 1.8 0"
        scale="1 1.5 1.4"
        class="clickable"
      >
      </a-entity>

         <a-entity
        gltf-model="#side-table-model"
        rotation="0 270 0"
        position="1 0.5 1"
        scale="1 1 1"
        class="clickable"
      >
      </a-entity>

      <a-entity
        gltf-model="#rug-model"
        rotation="0 30 0"
        position="0 0.01 0"
        scale="4 4 4"
      >
      </a-entity>

      <!-- ROOM -->

      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="6"
        height="6"
        color="#1a0f0a"
      ></a-plane>

      <a-plane
        position="0 3 0"
        rotation="90 0 0"
        width="6"
        height="6"
        color="#0d0820"
      ></a-plane>

      <a-plane
        position="0 1.5 -3"
        rotation="0 0 0"
        width="6"
        height="3"
        color="#12082a"
      ></a-plane>

      <a-plane
        position="0 1.5 3"
        rotation="0 180 0"
        width="6"
        height="3"
        color="#12082a"
      ></a-plane>

      <a-plane
        position="-3 1.5 0"
        rotation="0 90 0"
        width="6"
        height="3"
        color="#0f0a1f"
      ></a-plane>

      <a-plane
        position="3 1.5 0"
        rotation="0 -90 0"
        width="6"
        height="3"
        color="#0f0a1f"
      ></a-plane>

      <a-light type="ambient" color="#ffffff" intensity="2"></a-light>
      <a-light
        type="point"
        color="#6b2fa0"
        intensity="2"
        position="0 3 -3"
      ></a-light>
      <a-light
        type="point"
        color="#1a4a2e"
        intensity="3"
        position="-4 2 -3"
      ></a-light>

      <a-camera position="0 1.4 0">
        <a-cursor color="#ffffff"></a-cursor>
      </a-camera>
    </a-scene>

    <script src="js/interactions.js"></script>
  </body>
</html>

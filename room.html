<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wonderland XR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
  </head>
  <body>
    <div
      id="fadeOverlay"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        opacity: 0;
        transition: opacity 1.5s ease;
        pointer-events: none;
        z-index: 9999;
      "
    ></div>

    <a-scene
      fog="type: exponential; color: #1a0a2e; density: 0.04"
      raycaster="objects: .clickable"
    >
      <!-- ASSETS -->

      <a-assets>
        <a-asset-item
          id="mirror-model"
          src="https://res.cloudinary.com/dojkiz54j/image/upload/mirror_fhhfud.glb"
        ></a-asset-item>
        <a-asset-item
          id="table-model"
          src="assets/tea_table.glb"
        ></a-asset-item>

        <a-asset-item
          id="cake-model"
          src="https://res.cloudinary.com/dojkiz54j/image/upload/cake_od6e72.glb"
        ></a-asset-item>
        <a-asset-item
          id="potion-model"
          src="https://res.cloudinary.com/dojkiz54j/image/upload/potion_idav1c.glb"
        ></a-asset-item>
        <a-asset-item
          id="clock-model"
          src="https://res.cloudinary.com/dojkiz54j/image/upload/clock_kzmvjb.glb"
        ></a-asset-item>
        <a-asset-item id="door-model" src="assets/door.glb"></a-asset-item>
        <a-asset-item
          id="door-model"
          src="https://res.cloudinary.com/dojkiz54j/image/upload/door_zo35zz.glb"
        ></a-asset-item>

        <img
          id="taban-diffuse"
          src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/terrain/grasslight-big_nm.jpg"
          style="display: none"
        />
        <img
          id="kalas-color"
          src="https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/cube/pisa/px.png"
          style="display: none"
        />
        <img
          id="wood-planks"
          src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/floors/FloorsCheckerboard_S_Diffuse.jpg"
        />

        <img
          id="heavy-wood-color"
          src="https://threejs.org/examples/textures/hardwood2_diffuse.jpg"
        />
        <img
          id="heavy-wood-bump"
          src="https://threejs.org/examples/textures/hardwood2_bump.jpg"
        />
        <img id="wallpaper" src="assets/wallpaper.png" />

        <audio
          id="ambientSound"
          src="https://res.cloudinary.com/dojkiz54j/video/upload/wind-ambience_ejbmuw.wav"
          preload="auto"
        ></audio>

        <audio
          id="clockAudio"
          src="https://res.cloudinary.com/dojkiz54j/video/upload/clock-ticking_dkgvms.mp3"
        ></audio>

        <audio
          id="mirrorAudio"
          src="https://res.cloudinary.com/dojkiz54j/video/upload/mirror-clink_muysnm.mp3"
        ></audio>

        <audio
          id="potionAudio"
          src="https://res.cloudinary.com/dojkiz54j/video/upload/bottle_dk0owy.mp3"
        ></audio>

        <audio
          id="heartbeatAudio"
          src="https://res.cloudinary.com/dojkiz54j/video/upload/heartbeat_jcdkzd.mp3"
        ></audio>

        <audio
          id="cakeAudio"
          src="https://res.cloudinary.com/dojkiz54j/video/upload/chewing_mnk4fm.wav"
        ></audio>
      </a-assets>

      <!-- ENTITIES-->
      <a-ring
        id="mirrorGlow"
        position="-0.644 1.3 -2.95"
        radius-inner="0.85"
        radius-outer="0.95"
        color="#ffffff"
        opacity="0.3"
        animation="
        property: scale;
        from: 1 1 1;
        to: 1.2 1.2 1.2;
        dur: 2500;
        loop: true;"
      >
      </a-ring>

      <a-entity
        id="mirror"
        gltf-model="#mirror-model"
        rotation="0 0 0"
        position="-0.558 0.132 -2.491"
        scale="0.4 0.409 0.400"
        class="clickable"
      ></a-entity>

      <!--mirror interaction text-->

      <a-text
        id="mirrorText"
        value=""
        position="0 1.4 -2.2"
        align="center"
        color="#FFFFFF"
        width="2.5"
        scale="1.5 1.5 1.5"
        anchor="center"
        visible="false"
        look-at="#camera"
      ></a-text>

      <a-entity
        gltf-model="#table-model"
        rotation="0 180 0"
        position="0 0 1.642"
        scale="1 1 1"
      ></a-entity>

      <!--cake interaction-->

      <a-ring
        id="cakeGlow"
        position="-0.39 0.81 1.642"
        rotation="-90 0 0"
        radius-inner="0.25"
        radius-outer="0.32"
        color="#ffffff"
        opacity="0.3"
        animation="
      property: scale;
      from: 1 1 1;
      to: 1.2 1.2 1.2;
      dur: 2500;
      loop: true;"
      >
      </a-ring>

      <a-text
        id="cakeText"
        value=""
        position="-1.2 1.5 1.642"
        align="center"
        color="#FFFFFF"
        scale="1.5 1.5 1.5"
        width="2"
        anchor="center"
        visible="false"
        look-at="#camera"
      ></a-text>

      <a-entity
        id="cake"
        gltf-model="#cake-model"
        rotation="0 90 0"
        position="-0.390 0.799 1.642"
        scale="0.001 0.001 0.001"
        class="clickable"
      ></a-entity>

      <!--potion bottle-->
      <a-ring
        id="potionGlow"
        position="0.3 0.81 1.642"
        rotation="-90 0 0"
        radius-inner="0.18"
        radius-outer="0.24"
        color="#ffffff"
        opacity="0.3"
        animation="
          property: scale;
          from: 1 1 1;
          to: 1.08 1.08 1.08;
          dir: alternate;
          dur: 2000;
          loop: true;"
      ></a-ring>
      <a-entity
        id="potion"
        gltf-model="#potion-model"
        rotation="0 0 0"
        position="0.3 0.932 1.643"
        scale="0.303 0.271 0.237"
        class="clickable"
      ></a-entity>

      <a-text
        id="potionText"
        value=""
        position="1.2 1.5 1.643"
        align="center"
        scale="1.5 1.5 1.5"
        color="#ffffff"
        width="2"
        anchor="center"
        visible="false"
        look-at="#camera"
      ></a-text>

      <!--clock-->
      <a-ring
        id="clockGlow"
        position="2 1.2 -2.624"
        radius-inner="0.75"
        radius-outer="0.85"
        color="#ffffff"
        opacity="0.3"
        animation="
        property: scale;
        from: 1 1 1;
        to: 1.2 1.2 1.2;
        dur: 2500;
        loop: true;"
      >
      </a-ring>

      <a-entity
        id="clock"
        gltf-model="#clock-model"
        position="2.001 0.014 -2.624"
        rotation="0 -90 0 "
        scale="0.159 0.159 0.159"
        class="clickable"
      ></a-entity>

      <a-text
        id="clockText"
        value=""
        position="2 1.6 -2"
        align="center"
        scale="1.5 1.5 1.5"
        color="#ffffff"
        width="2"
        anchor="center"
        visible="false"
        look-at="#camera"
      ></a-text>

      <!-- EXIT DOOR ON LEFT WALL (hidden at start) -->
      <a-entity
        id="exitDoor"
        gltf-model="#door-model"
        position="-2.9 0 0"
        rotation="0 90 0"
        scale="1 1 1"
        visible="false"
      >
      </a-entity>

      <!-- ROOM -->

      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="6"
        height="6"
        material="
          src: #heavy-wood-color; 
          color: #5c3a21;
          bumpMap: #heavy-wood-bump; 
          bumpScale: 0.25;
          ambientOcclusionMap: #heavy-wood-bump;
          ambientOcclusionMapIntensity: 2.0;
          roughness: 0.9; 
          metalness: 0.0;
          repeat: 3.5 6;"
      ></a-plane>

      <a-plane
        position="0 3 0"
        rotation="90 0 0"
        width="6"
        height="6"
      ></a-plane>

      <a-plane
        position="0 1.5 -3"
        rotation="0 0 0"
        width="6"
        height="3"
        material="src: #wallpaper; repeat: 2 1"
      ></a-plane>

      <a-plane
        position="0 1.5 3"
        rotation="0 180 0"
        width="6"
        height="3"
        material="src: #wallpaper; repeat: 2 1"
      ></a-plane>

      <a-plane
        position="-3 1.5 0"
        rotation="0 90 0"
        width="6"
        height="3"
        material="src: #wallpaper; repeat: 2 1"
      ></a-plane>

      <a-plane
        position="3 1.5 0"
        rotation="0 -90 0"
        width="6"
        height="3"
        material="src: #wallpaper; repeat: 2 1"
      ></a-plane>

      <!-- INFO FRAME ON LEFT WALL -->
      <a-entity id="infoFrame" position="-2.9 1.8 0" rotation="0 90 0">
        <!-- Wood frame (deeper, with thickness) -->
        <a-box width="1.6" height="0.6" depth="0.08" color="#1f1208"> </a-box>

        <!-- Black background (slightly raised from frame) -->
        <a-box
          position="0 0 0.05"
          width="1.4"
          height="0.45"
          depth="0.02"
          color="#000000"
        >
        </a-box>

        <!-- White text -->
        <a-text
          value="When all four are seen,\nthe way out appears."
          position="0 0 0.07"
          align="center"
          color="#ffffff"
          width="1.5"
          anchor="center"
        >
        </a-text>
      </a-entity>

      <a-light type="ambient" color="#1a233a" intensity="0.8"></a-light>

      <a-light
        type="point"
        color="#d6e4ff"
        intensity="2.0"
        position="0 2.9 0"
        distance="8"
      ></a-light>

      <a-light
        type="point"
        color="#4effb7"
        intensity="1.8"
        position="0 2.2 0.5"
        distance="6"
        castShadow="true"
      ></a-light>

      <a-light
        type="point"
        color="#4a1a6d"
        intensity="1.5"
        position="0 1.5 -2.0"
        distance="5"
      ></a-light>

      <a-camera id="camera" position="0 1.4 0">
        <a-cursor
          color="#ffffff"
          fuse="true"
          fuse-timeout="1500"
          raycaster="objects: .clickable"
          animation__click="property: scale; from: 0.1 0.1 0.1; to: 1 1 1; easing: easeInCubic; dur: 150; startEvents: click"
          animation__fusing="property: scale; from: 1 1 1; to: 0.1 0.1 0.1; easing: easeInCubic; dur: 1500; startEvents: fusing"
        >
        </a-cursor>
      </a-camera>

      <!--background sound-->
      <a-sound
        id="ambientAudio"
        sound="
      src: #ambientSound;
      autoplay: true;
      loop: true;
      volume: 1;
      "
      ></a-sound>

      <!--mirror clink sound-->
      <a-sound id="mirrorSound" src="#mirrorAudio" volume="0.5"> </a-sound>

      <!--clock ticking sound-->
      <a-sound
        id="clockSound"
        src="#clockAudio"
        loop="true"
        volume="0.5"
      ></a-sound>

      <!--potion bottle int sound-->
      <a-sound id="potionSound" src="#potionAudio" volume="1"> </a-sound>

      <!--heartbeat sound-->
      <a-sound
        id="heartbeatSound"
        src="#heartbeatAudio"
        volume="1"
        loop="true"
      ></a-sound>

      <!--cake chewing sound-->
      <a-sound id="cakeSound" src="#cakeAudio" volume="1"></a-sound>
    </a-scene>

    <script src="js/interactions.js"></script>
  </body>
</html>
